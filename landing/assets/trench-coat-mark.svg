          fill="#0a0a12" stroke="url(#neon)" stroke-width="3.5"/>
    <path d="M-25 25 L0 70 L25 25" fill="none" stroke="#00FF9F" stroke-width="2.5"/>
    <path d="M-40 100 H-10 M-10 100 V140 H15 M15 140 V180"
