<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Trench Coat mark">
  <!-- GitHub-safe mark: no filters / scripts so raw SVG renders in README -->
  <defs>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF9F"/>
      <stop offset="50%" stop-color="#7B2CBF"/>
      <stop offset="100%" stop-color="#FF00AA"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a0a24"/>
      <stop offset="100%" stop-color="#05050a"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <g stroke="#00FF9F" stroke-opacity="0.18" stroke-width="1">
    <line x1="40" y1="0" x2="20" y2="120"/>
    <line x1="90" y1="20" x2="70" y2="160"/>
    <line x1="160" y1="0" x2="140" y2="140"/>
    <line x1="240" y1="30" x2="220" y2="180"/>
    <line x1="320" y1="10" x2="300" y2="150"/>
    <line x1="400" y1="0" x2="380" y2="130"/>
    <line x1="460" y1="40" x2="440" y2="170"/>
  </g>
  <path fill="#0a0612" d="M0 420 L40 360 L70 360 L70 300 L110 300 L110 340 L150 280 L190 280 L190 320 L230 250 L270 250 L270 300 L310 220 L350 220 L350 310 L390 270 L430 270 L430 340 L470 300 L512 300 L512 512 L0 512 Z"/>
  <g stroke="url(#neon)" stroke-width="2" fill="none" opacity="0.55">
    <rect x="80" y="340" width="8" height="8"/><rect x="100" y="320" width="8" height="8"/>
    <rect x="200" y="300" width="8" height="8"/><rect x="320" y="280" width="8" height="8"/>
    <rect x="400" y="310" width="8" height="8"/>
  </g>
  <!-- fedora -->
  <g transform="translate(256 150)">
    <ellipse cx="0" cy="28" rx="78" ry="12" fill="none" stroke="#FF00AA" stroke-width="4"/>
    <path d="M-48 20 Q-40 -30 0 -38 Q40 -30 48 20 Z" fill="#0a0a10" stroke="#00FF9F" stroke-width="3"/>
    <path d="M-30 8 H30" stroke="#FF00AA" stroke-width="3"/>
  </g>
  <!-- trench coat -->
  <g transform="translate(256 210)">
    <path d="M-70 20 L-85 220 L-30 220 L-20 90 L0 110 L20 90 L30 220 L85 220 L70 20
